site_name: ww的技术博客与知识库
site_description: AI Agent、Claude Code、Python、FastAPI、Linux、Android 与自动化工具实践记录
site_url: https://stillness990.github.io/blog/
repo_name: stillness990/blog
repo_url: https://github.com/stillness990/blog
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 ww

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    logo: material/brain
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - blog:
      blog_dir: blog
      blog_toc: true
      post_dir: "{blog}/posts"
      post_date_format: full
      post_url_date_format: yyyy/MM/dd
      archive: true
      archive_name: 归档
      categories: true
      categories_name: 分类
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      timezone: Asia/Shanghai
      locale: zh

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: 本页目录
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stillness990
      name: GitHub
  generator: false

nav:
  - 首页: index.md
  - 博客:
      - blog/index.md
  - 项目:
      - projects/index.md
      - 位置推送系统: projects/location-push-system.md
      - skill-os-complete SOP: projects/skill-os-complete-sop.md
      - agent-qq QQ AI Agent:
          - projects/agent-qq/index.md
          - 部署指南: projects/agent-qq/deployment-guide.md
          - 升级与测试报告: projects/agent-qq/v2.0.1-upgrade-and-test.md
  - 学习笔记:
      - notes/index.md
      - Python: notes/python.md
      - FastAPI: notes/fastapi.md
      - Linux: notes/linux.md
      - Android: notes/android.md
  - 知识库:
      - knowledge/index.md
      - AI Agent: topics/ai-agent/index.md
      - Claude Code: topics/claude-code/index.md
      - OpenAI Codex: topics/openai-codex/index.md
      - 自动化工具: topics/automation/index.md
  - 关于: about.md
